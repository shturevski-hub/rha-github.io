<!DOCTYPE html>
<html lang="en">
<head>

    <script>
        if (sessionStorage.getItem('clinic_access') !== 'granted') {
            window.location.href = "login.html";
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHA Workbook | Notepad</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Navigation Styling */
        .dropdown-nav {
            width: 100%;
            background-color: #2c3e50;
            padding: 10px 20px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 4px;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover { background-color: #f1f1f1; }
        .dropdown-content a.active { background-color: #3498db; color: white; }
        .show { display: block; }

        /* Notepad Layout */
        .header-section { text-align: center; margin: 20px 0; }
        
        .notepad-window { 
            width: 95%; 
            max-width: 1200px; 
            height: 80vh; 
            background: white; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow: hidden; 
            margin-bottom: 20px;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav class="dropdown-nav">
        <button class="menu-button" onclick="toggleMenu()">Menu ☰</button>
        <div id="dropdown-content" class="dropdown-content">
            <a href="index.html">Home</a>
             <a href="manual.html"> Manual </a> 
            <a href="selfPayPrices.html">Self-Pay</a>
            <a href="webforms.html"> Webforms </a>
            <a href="hours.html">Clinic Hours</a>
            <a href="providersTrenton.html">Trenton Internal</a>
            <a href="visitTypes.html">Visit Types</a>
            <a href="additionalInfo.html">Additional Info</a>
            <a href="controlPanel.html">Admin Control</a>
            <a href="training.html">Training</a>
            <a href="hub.html" class="active">Notepad</a>
        </div>
    </nav>

    <div class="header-section">
        <h1>RHA Workbook Hub</h1>
    </div>

    <div class="notepad-window">
        <iframe src="https://docs.google.com/document/d/1iS_SQPgAii4jqhsidYfP9TGbYdDkN3YlmOpy6DWH4Tc/edit"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("dropdown-content").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.menu-button')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>

</body>
</html>
