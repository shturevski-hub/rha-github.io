<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Portal - Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #f1f5f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
        }
        .logo { width: 70px; margin-bottom: 20px; }
        h2 { color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 0.9em; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 1em; 
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 2px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        .error { 
            color: #e11d48; 
            font-size: 0.85em; 
            margin-top: 15px; 
            display: none; 
            font-weight: 600;
        }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">
    <div class="login-card">
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Agent <b>Portal</b></h2>
        <p>Please enter the Clinic Access Key</p>
        
        <input type="password" id="key" placeholder="••••••••" onkeypress="handleKey(event)">
        <button onclick="verify()">Unlock Toolkit</button>
        <div id="error" class="error">Access Denied: Invalid Key</div>
    </div>

    <script>

function disableShortcuts(e) {
 
    if (e.ctrlKey && (e.key === 'u' || e.key === 'U') || e.keyCode === 123) {
        e.preventDefault();
        return false;
    }
}


        let idleTime = 0;
const idleInterval = setInterval(timerIncrement, 60000); // Check every minute

// Reset timer on movement
window.onmousemove = window.onkeypress = () => { idleTime = 0; };

function timerIncrement() {
    idleTime++;
    if (idleTime >= 480) { // 10 minutes (Note: 480 used in your original script is actually 8 hours, 10 minutes is 10)
        sessionStorage.removeItem('clinic_access');
        window.location.href = "login.html";
    }
}

        
        //if someone gains access to this without confirmation of the company, we have an IP tracker, VPN tracker, and internet tracker. You will be caught and sued.
        
        const _v = "Q0ZNMjAyNg==";

        function verify() {
            const input = document.getElementById('key').value;
            const error = document.getElementById('error');
            
            if (btoa(input) === _v) { 
                // 1. Grant Access
                localStorage.setItem('clinic_access', 'granted');
                
                // 2. Set 8-Hour Timestamp
                localStorage.setItem('last_login_time', new Date().getTime());

                // 3. Reset Intro for new session
                sessionStorage.removeItem('intro_played');

                window.location.href = "index.html";
            } else {
                error.style.display = 'block';
                document.getElementById('key').value = "";
            }
        }
        function handleKey(e) { if(e.key === 'Enter') verify(); }
    </script>
</body>
</html>
