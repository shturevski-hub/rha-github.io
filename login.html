<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Portal - Step 1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; }
        .logo { width: 70px; margin-bottom: 20px; }
        h2 { color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 0.9em; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; text-align: center; letter-spacing: 2px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .error { color: #e11d48; font-size: 0.85em; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="login-card">
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Agent <b>Portal</b></h2>
        <p>Please enter the Clinic Access Key</p>
        <input type="password" id="key" placeholder="••••••••" onkeypress="if(event.key==='Enter') verify()">
        <button onclick="verify()">Unlock Toolkit</button>
        <div id="error" class="error">Access Denied: Invalid Key</div>
    </div>

    <script>
        const _v = "Q0ZNMjAyNg=="; 
        function verify() {
            const input = document.getElementById('key').value;
            if (btoa(input) === _v) {
                sessionStorage.setItem('gate1', 'passed');
                window.location.href = "lock.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
