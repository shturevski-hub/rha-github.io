<!DOCTYPE html>
<html lang="en">
<head>

<script>
        if (sessionStorage.getItem('clinic_access') !== 'granted') {
            window.location.href = "login.html";
        }
    </script>

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tracker - Christian Family Medicine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .tracker-container {
            width: 100%;
            height: 85vh;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .tracker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .refresh-notice {
            font-size: 0.8em;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="main-content-wrapper">
        <header>
            <div class="header-content">
                <div class="logo-container">
                    <img src="logo.png" alt="Logo" class="logo">
                    <h1 class="site-title">Data <b>Tracker</b></h1>
                </div>
                <div id="trenton-clock">00:00:00</div>
                <nav class="dropdown-nav">
                    <button class="menu-button" onclick="toggleMenu()">Menu ☰</button>
                    <div id="dropdown-content" class="dropdown-content">
                        <a href="index.html">Home</a>
                        <a href="manual.html">Manual</a> 
                        <a href="webforms.html">Webforms</a>
                        <a href="tracker.html" class="active">Tracker</a>
                        <a href="hub.html">Notepad</a>
                    </div>
                </nav>
            </div>
        </header>

        <main class="container">
            <div class="tracker-header">
                <h2>Shared Team Excel</h2>
                <span class="refresh-notice">Live Editing Enabled</span>
            </div>

            <div class="tracker-container">
                <iframe src="https://fastpacehealth-my.sharepoint.com/personal/sarah_martin_fastpacehealth_com/_layouts/15/Doc.aspx?sourcedoc={006b7670-8943-4088-ace9-c6ac5ef3a07a}&action=embedview&AllowTyping=True&wdHideGridlines=False&wdHideHeaders=False&wdDownloadButton=True&wdInConfigurator=True"></iframe>
            </div>
            
            <p style="margin-top: 15px; font-size: 0.85em; color: #475569;">
                <b>Note:</b> If the sheet is locked, ensure no one else has a specific cell "hard-locked" in the main Excel app.
            </p>
        </main>

        <footer>
            <p>&copy; 2026 Christian Family Medicine & Pediatrics</p>
        </footer>
    </div>

    <script>
        function toggleMenu() { document.getElementById('dropdown-content').classList.toggle('show'); }
        function updateClock() {
            document.getElementById('trenton-clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000); 
        updateClock();
    </script>
</body>
</html>
