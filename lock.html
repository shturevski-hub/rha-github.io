<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Portal - Step 2</title>
    <style>
        body { background: #1e293b; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 6px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #loading-screen { display: none; text-align: center; color: white; }
        #welcome-message { font-size: 2em; margin-bottom: 10px; }
        .subtext { color: #cbd5e1; margin-bottom: 25px; }
        .spinner {
            margin: 0 auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #10b981;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-message { color: #e11d48; font-size: 0.85em; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card" id="login-card">
        <h2>Verify Identity</h2>
        <input type="password" id="id" placeholder="name.rha" onkeypress="if(event.key==='Enter') verify()">
        <button onclick="verify()">Unlock Toolkit</button>
        <div id="error-message"></div>
    </div>

    <div id="loading-screen">
        <h2 id="welcome-message"></h2>
        <p class="subtext">We are setting things up for you...</p>
        <div class="spinner"></div>
    </div>

    <script>
        if (sessionStorage.getItem('gate1') !== 'passed') { window.location.href = "login.html"; }

        const ALLOWED_USERS = [
            "stefan.rha",
            "jasmina.rha",
            "gjorgji.rha",
	    "anastazija.rha",
            "ivo.rha",
            "marina.rha",
            "stefanija.rha",
			"nikola.rha",
			"atanasko.rha",
			"angela.rha",
			"andrej.rha",
			"aleksandar.rha",
			"nikola2.rha",
			"medina.rha",
			"jovana.rha",
			"mihael.rha",
            "kristina.rha"];

        function verify() {
            const input = document.getElementById('id').value.trim().toLowerCase();
            const errorElement = document.getElementById('error-message');
            errorElement.style.display = 'none';
            
            if (ALLOWED_USERS.includes(input)) {
                sessionStorage.setItem('gate2', 'passed');
                sessionStorage.removeItem('intro_played'); 

                const rawName = input.substring(0, input.length - 4);
                const formattedName = rawName.charAt(0).toUpperCase() + rawName.slice(1);

                document.getElementById('login-card').style.display = 'none';
                document.getElementById('welcome-message').textContent = `Welcome ${formattedName}`;
                document.getElementById('loading-screen').style.display = 'block';

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2500);

            } else {
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                errorElement.textContent = `ID is not Recognized, reported to management at ${timeString}`;
                errorElement.style.display = 'block';
            }
        }
    </script>
</body>
</html>
